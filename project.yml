name: ClipboardSticky
options:
  bundleIdPrefix: com.clipboardsticky
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  ClipboardSticky:
    type: application
    platform: macOS
    sources:
      - path: Sources/ClipboardSticky
    resources:
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Sources/ClipboardSticky/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.clipboardsticky.app
        PRODUCT_NAME: "ClipboardSticky"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        SWIFT_OBJC_BRIDGING_HEADER: ""
    dependencies: []
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []
